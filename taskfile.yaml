version: '3'

# The version in src/.claude-plugin/plugin.json (0.1.0) is a placeholder for local development.
# CI overrides it with 0.0.<N> derived from git rev-list --count HEAD -- src/ at build time.

tasks:
  pack:
    desc: Package the plugin into a versioned zip archive in dist/
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - |
        NAME=$(jq -r .name src/.claude-plugin/plugin.json)
        VERSION=$(jq -r .version src/.claude-plugin/plugin.json)
        OUT="dist/${NAME}-${VERSION}.zip"
        mkdir -p dist
        rm -f "$OUT"
        (cd src && zip -r "../$OUT" .claude-plugin .mcp.json skills -x '*.DS_Store')
        echo "Packed $OUT"

  validate:
    desc: Validate the plugin manifest and skill frontmatter
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - claude plugin validate ./src

  clean:
    desc: Remove packaged archives
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - rm -rf dist

  sync:
    desc: |
      Rsync src/skills/* into the installed plugin under Claude Desktop's
      application support dir. macOS-only, bash 4+. Pass a single skill name
      with `--` (e.g. `task sync -- noibu-context`), or run without args to
      sync every skill.
    dir: '{{.TASKFILE_DIR}}'
    cmds:
      - ./sync-skills.sh {{.CLI_ARGS}}

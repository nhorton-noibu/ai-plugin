<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;padding:4px}
.funnel{font-family:'Inter',system-ui,-apple-system,sans-serif;background:transparent;border:.5px solid var(--f-border);border-radius:8px;overflow:hidden;width:100%}
.fi{padding:12px 12px 0;display:grid;grid-template-rows:auto 208px;gap:20px 0;position:relative}
.fh,.fb{display:flex}
.fb{height:208px}
.sh{flex:1;min-width:0;padding-right:20px;position:relative;display:flex;flex-direction:column;gap:4px}
.sl{font-size:12px;font-weight:500;line-height:18px;color:var(--f-label);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sm{display:flex;align-items:baseline;gap:8px;width:100%;white-space:nowrap;overflow:hidden}
.mv{font-size:14px;font-weight:600;line-height:20px;color:var(--f-val);flex:0 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dv{font-size:12px;font-weight:600;line-height:18px;flex-shrink:0;white-space:nowrap}
.sv{flex:1;position:relative;height:208px;min-width:0}
.tt{position:absolute;background:rgba(20,20,20,.92);color:#fff;font-size:12px;line-height:1.5;padding:8px 10px;border-radius:6px;pointer-events:none;z-index:10;white-space:nowrap;display:none}
:root{--f-border:rgba(0,0,0,.2);--f-label:rgba(0,0,0,.6);--f-val:#24326e;--f-bar:#24326e;--f-drop-bg:rgba(45,45,45,.12);--f-drop-txt:rgba(45,45,45,.7);--f-con:linear-gradient(to bottom,hsla(229,90%,29%,.24),hsla(229,90%,29%,.08));--f-zz:#FDFDFC;--f-dpos:#046249;--f-dneg:#894c06}
@media(prefers-color-scheme:dark){:root{--f-border:rgba(255,255,255,.15);--f-label:rgba(255,255,255,.55);--f-val:#8aa4f5;--f-bar:#2d45a0;--f-drop-bg:rgba(255,255,255,.08);--f-drop-txt:rgba(255,255,255,.45);--f-con:linear-gradient(to bottom,hsla(229,80%,70%,.20),hsla(229,80%,70%,.06));--f-zz:#1F1F1E;--f-dpos:#2db87a;--f-dneg:#d47c1a}}
</style>
<div id="W" style="position:relative"><div class="funnel"><div class="fi">
  <div class="fh" id="H"></div>
  <div class="fb" id="B"></div>
</div></div></div>
<script>
const STEPS=__STEPS__;
const OPTS=__OPTS__;
const CH=208,COMP=3.5,MB=30;
const s0=STEPS[0],s1=STEPS[1];
const isC=s1&&s0.sessions/s1.sessions>=COMP;
const ref=isC?s1.sessions:s0.sessions;
const maxH=isC?CH-32:CH;
function tpx(i){
  if(i===0&&isC)return 0;
  const h=Math.min(STEPS[i].sessions/ref,1)*maxH;
  const raw=Math.round(CH-h);
  return (isC&&i===1)?Math.max(raw,32):raw;
}
const fn=n=>{if(n>=1e6)return (n/1e6).toFixed(1).replace(/\.0$/,'')+' M';if(n>=1e4)return (n/1e3).toFixed(1).replace(/\.0$/,'')+' K';return n.toLocaleString();};
const fk=n=>n>=1000?Math.round(n/1000)+'k':n.toLocaleString();
const fp=(a,b)=>{const r=(a/b*100).toFixed(1);return (r==='0.0'&&a>0)?'<0.0%':r+'%';};
const fd=(d,isFirst)=>{
  const unit=isFirst?'%':'pp';
  const r=parseFloat(Math.abs(d).toFixed(1));
  if(r===0)return {txt:'± 0',col:'var(--f-label)'};
  return {txt:(d>0?'↑ ':'↓ ')+r+unit,col:d>0?'var(--f-dpos)':'var(--f-dneg)'};
};
function addZz(parent){
  const w=document.createElement('div');
  w.style.cssText='position:absolute;top:32px;left:0;right:0;height:7px;display:flex;align-items:center;justify-content:center';
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width','600');svg.setAttribute('height','7');svg.setAttribute('viewBox','-300 0 600 7');
  svg.style.cssText='flex:none;display:block';
  let d='';
  for(let x=-300;x<=300;x+=4){const y=(((x/4)%2)+2)%2===0?1:5;d+=(d?'L':'M')+x+','+y;}
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d',d);p.setAttribute('fill','none');p.setAttribute('stroke-width','2');p.style.stroke='var(--f-zz)';
  svg.appendChild(p);w.appendChild(svg);parent.appendChild(w);
}
const tip=OPTS.tooltips;
let tt=null;
if(tip){
  tt=document.createElement('div');tt.className='tt';
  document.getElementById('W').appendChild(tt);
}
const H=document.getElementById('H'),B=document.getElementById('B');
const tops=STEPS.map((_,i)=>tpx(i));
STEPS.forEach((s,i)=>{
  const hd=document.createElement('div');
  hd.className='sh';
  const hasDelta=s.delta!=null;
  const metTxt=i===0?(hasDelta?fk(s.sessions):fn(s.sessions))+' sessions':fp(s.sessions,s0.sessions);
  let deltaHtml='';
  if(hasDelta){const {txt,col}=fd(s.delta,i===0);deltaHtml=`<span class="dv" style="color:${col}">${txt}</span>`;}
  hd.innerHTML=`<div class="sl">${s.name}</div><div class="sm"><span class="mv">${metTxt}</span>${deltaHtml}</div>`;
  if(i<STEPS.length-1){const vl=document.createElement('div');vl.style.cssText='position:absolute;right:12px;top:0;width:0.5px;height:1200px;background:var(--f-border);pointer-events:none';hd.appendChild(vl);}
  H.appendChild(hd);
  const v=document.createElement('div');v.className='sv';
  const tp=tops[i],bh=CH-tp;
  const pS=i>0?STEPS[i-1]:null,nTp=i<STEPS.length-1?tops[i+1]:null;
  const short=bh<MB;
  const SLH=18,DLH=16,pt=i>0?tops[i-1]:0;
  let sessionAbove=false;
  if(pS){
    const dPct=((1-s.sessions/pS.sessions)*100).toFixed(1);
    const dropZoneH=tp-pt;
    let dropoffAbove=false;
    if(!tip){
      if(short){
        if(dropZoneH<SLH){sessionAbove=true;dropoffAbove=true;}
        else if(dropZoneH<SLH+DLH+4){dropoffAbove=true;}
      } else {
        if(dropZoneH<26)dropoffAbove=true;
      }
    }
    const da=document.createElement('div');
    da.style.cssText=`position:absolute;left:0;right:50%;bottom:0;top:${pt}px;background:var(--f-drop-bg);border-radius:4px 4px 0 0`;
    if(!tip&&!dropoffAbove){
      da.innerHTML=`<div style="position:absolute;left:8px;top:8px;font-size:11px;font-weight:500;color:var(--f-drop-txt);white-space:nowrap">${dPct}% dropoff</div>`;
    }
    v.appendChild(da);
    if(dropoffAbove){
      const dl=document.createElement('div');
      const dlTop=sessionAbove?Math.max(pt-4-DLH-4-SLH,0):Math.max(pt-4-DLH,0);
      dl.style.cssText=`position:absolute;left:8px;top:${dlTop}px;font-size:11px;font-weight:500;color:var(--f-drop-txt);white-space:nowrap`;
      dl.textContent=dPct+'% dropoff';
      v.appendChild(dl);
    }
  }
  if(nTp!==null){
    const con=document.createElement('div');
    const conH=CH-tp,p1pct=((nTp-tp)/conH*100).toFixed(2);
    con.style.cssText=`position:absolute;right:0;top:${tp}px;width:50%;height:${conH}px;clip-path:polygon(0 0%,100% ${p1pct}%,100% 100%,0 100%);background:var(--f-con)`;
    v.appendChild(con);
  }
  const bar=document.createElement('div');
  bar.style.cssText=`position:absolute;left:0;right:50%;bottom:0;top:${tp}px;background:var(--f-bar);border-radius:4px 4px 0 0;overflow:hidden`;
  if(tip)v.style.cursor='default';
  if(!tip){
    if(!short){
      const lbl=document.createElement('div');
      lbl.style.cssText='position:absolute;left:8px;top:8px;font-size:12px;font-weight:600;color:#fff;white-space:nowrap';
      lbl.textContent=fn(s.sessions);
      bar.appendChild(lbl);
    } else {
      const nl=document.createElement('div');
      if(sessionAbove){
        nl.style.cssText=`position:absolute;left:8px;top:${Math.max(pt-4-SLH,0)}px;font-size:12px;font-weight:600;color:var(--f-val);white-space:nowrap`;
      } else {
        nl.style.cssText=`position:absolute;left:8px;bottom:${bh+4}px;font-size:12px;font-weight:600;color:var(--f-val);white-space:nowrap`;
      }
      nl.textContent=fn(s.sessions);
      v.appendChild(nl);
    }
  }
  if(i===0&&isC)addZz(bar);
  v.appendChild(bar);
  if(!tip&&nTp!==null){
    const cp=fp(STEPS[i+1].sessions,s.sessions);
    const cl=document.createElement('div');
    const clH=16,clCenter=nTp+(CH-nTp)/2;
    const clTop=Math.min(clCenter-clH/2,CH-clH-4);
    cl.style.cssText=`position:absolute;left:50%;right:0;top:${clTop}px;height:${clH}px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--f-val);z-index:1`;
    cl.textContent=cp;
    v.appendChild(cl);
  }
  if(tip&&tt){
    v.addEventListener('mouseenter',()=>{
      let html=`<div style="font-weight:600">${fn(s.sessions)} sessions</div>`;
      if(pS){
        const dPct=((1-s.sessions/pS.sessions)*100).toFixed(1);
        const cPct=(s.sessions/pS.sessions*100).toFixed(1);
        html+=`<div style="color:rgba(255,255,255,.65);margin-top:3px">${dPct}% dropoff from ${pS.name}</div>`;
        html+=`<div style="color:rgba(255,255,255,.65)">${cPct}% continued to this step</div>`;
      }
      tt.innerHTML=html;tt.style.display='block';
    });
    v.addEventListener('mousemove',e=>{
      const wr=document.getElementById('W').getBoundingClientRect();
      const x=e.clientX-wr.left;
      let y=e.clientY-wr.top-tt.offsetHeight-10;
      if(y<4)y=e.clientY-wr.top+16;
      tt.style.left=Math.min(x,wr.width-tt.offsetWidth-4)+'px';
      tt.style.top=y+'px';
    });
    v.addEventListener('mouseleave',()=>{tt.style.display='none';});
  }
  B.appendChild(v);
});
</script>
